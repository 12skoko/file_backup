# ─────────────────────────────────────
# 异地备份系统 — B 端 (target) 配置
# 命令: backup serve
# ─────────────────────────────────────

# ── HTTP 服务 ──
server:
  port: 9527                         # HTTP 监听端口
  token: "shared-secret"             # 必须与 A 端 target.token 一致

# ── WebDAV 服务（rclone 提供）──
webdav:
  port: 9528                         # WebDAV 端口（默认 HTTP 端口 + 1）
  root: /backup                      # WebDAV 根目录（所有 path 的公共父目录）

# ── 扫描路径（B 端需要扫描的本地目录）──
paths:
  - /backup/photos
  - /backup/docs

# ── 排除规则文件（可选）──
exclude_file: .backupignore

# ── 缓存目录（可选）──
cache_dir: /data/.backup

# ── 回收站 ──
trash:
  dir: /backup/.backup_trash         # 必须在 webdav.root 下
  keep_days: 30                      # 0 = 永久保留

# ── rclone ──
rclone:
  binary: rclone
